<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Tee Box Network</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1a13; color: #e8f5e9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1a2e1f; border: 1px solid #2d4a33; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; }
    .logo { font-size: 48px; text-align: center; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 800; color: #e8f5e9; text-align: center; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #81a887; text-align: center; margin-bottom: 32px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #81a887; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; margin-top: 20px; }
    input { width: 100%; background: #0f1a13; border: 1px solid #2d4a33; border-radius: 10px; padding: 14px 16px; font-size: 16px; color: #e8f5e9; outline: none; }
    input:focus { border-color: #4caf50; }
    button { width: 100%; background: #4caf50; color: #000; border: none; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { text-align: center; margin-top: 20px; font-size: 14px; padding: 12px; border-radius: 10px; }
    .message.success { background: #1b3a1e; color: #4caf50; border: 1px solid #4caf50; }
    .message.error { background: #3a1b1b; color: #ef5350; border: 1px solid #ef5350; }
    #form-section { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⛳</div>
    <h1>Reset Your Password</h1>
    <p class="subtitle">Enter a new password for your Tee Box Network account</p>

    <div id="form-section">
      <label>New Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" />
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" />
      <button id="submit-btn" onclick="resetPassword()">Set New Password</button>
    </div>

    <div id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://xglmjfeuwqesejxwupga.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbG1qZmV1d3Flc2VqeHd1cGdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg3NzQwNzIsImV4cCI6MjA1NDM1MDA3Mn0.yPdtPFcOjpBpNBHjCEBXFJa2rpJFQe-NkPMKRIi8diA';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hash = window.location.hash.substring(1);
    const query = window.location.search.substring(1);
    const params = new URLSearchParams(hash || query);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token') ?? '';
    const type = params.get('type');
    console.log('token:', accessToken ? 'present' : 'missing', 'type:', type, 'hash:', hash, 'query:', query);

    async function init() {
      if (!accessToken || type !== 'recovery') {
        document.getElementById('message').innerHTML = '<div class="message error">No token found. Type: ' + type + ' Token: ' + (accessToken ? 'present' : 'missing') + '</div>';
        return;
      }
      const {data, error} = await client.auth.setSession({access_token: accessToken, refresh_token: refreshToken});
      if (error) {
        document.getElementById('message').innerHTML = '<div class="message error">setSession error: ' + error.message + '</div>';
      } else {
        document.getElementById('form-section').style.display = 'block';
      }
    }

    init();

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('message');

      if (!password || password.length < 6) {
        msg.innerHTML = '<div class="message error">Password must be at least 6 characters.</div>';
        return;
      }
      if (password !== confirm) {
        msg.innerHTML = '<div class="message error">Passwords do not match.</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      await client.auth.setSession({access_token: accessToken, refresh_token: refreshToken});
      const {error} = await client.auth.updateUser({password});

      if (error) {
        msg.innerHTML = `<div class="message error">${error.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      } else {
        document.getElementById('form-section').style.display = 'none';
        msg.innerHTML = '<div class="message success">✓ Password updated! You can now log in to the app with your new password.</div>';
      }
    }
  </script>
</body>
</html>
